<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>С 8 Марта, любимая Мама!</title>
    <!-- Подключаем красивые шрифты от Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <!-- Подключаем наш файл стилей -->
    <link rel="stylesheet" href="styel.css" />
  </head>
  <body>
    <div class="card-container">
      <div class="card">
        <div class="decoration-top">🌸</div>

        <h1>С 8 Марта, любимая Мама!</h1>

        <div class="photo-frame">
          <!-- 
                   СЮДА ВСТАВЬ СВОЮ КАРТИНКУ.
                   Замени 'photo.jpg' на название твоего файла с картинкой.
                -->
          <img src="photo.jpg" alt="Цветы для мамы" />
        </div>

        <p class="greeting-text">
          Ты — самый родной и дорогой человек в моей жизни. Спасибо тебе за твою
          бесконечную любовь, тепло и заботу. Пусть эта весна принесет тебе
          столько же радости, сколько ты даришь мне каждый день!
        </p>

        <p class="signature">
          С любовью,<br />
          Твой ребенок ❤️
        </p>

        <div class="decoration-bottom">🌷</div>
      </div>
    </div>
  </body>
</html>
